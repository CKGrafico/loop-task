schema: spec-driven

context: |
  Tech stack: TypeScript (5.8, strict ESM), React 19 (OpenTUI 0.4.x for TUI board),
  Commander 13 (CLI parsing), execa 9.x (process spawn), ms 2.x (duration parsing).
  Build system: npm/pnpm; `tsc -p tsconfig.build.json` compiles to dist/ for Node;
  Bun >= 1.2 runs board .ts/.tsx directly. Vitest 3 + v8 coverage (90% threshold).
  Architecture: client-daemon over local IPC (Unix socket / Windows named pipe).
  Filesystem persistence (~/.loop-cli/) — no database, no network listener.
  Conventions: trunk-based on main, conventional commits (feat:/fix:/docs:/chore:/archive:),
  all magic numbers in src/config/constants.ts, all strings in src/i18n/en.json,
  IPC contract as single source of truth in src/types.ts, dictionary/strategy pattern
  over nested if/else, prefix shell commands with `rtk`.
  Domain: Loop engineering toolkit — run any shell command on a cadence, in the
  background, managed from a terminal board.

rules:
  proposal:
    - State the problem and the user-facing behavior change first.
    - Include a "Non-goals" section.
    - Call out impact on the IPC contract (src/types.ts), persisted state
      shape (LoopMeta), or cross-platform (Windows named pipe) behavior.
  tasks:
    - Break work into small, independently verifiable steps.
    - Route new magic numbers to src/config/constants.ts and new strings to
      src/i18n/en.json.
    - Every change must pass `rtk npx tsc --noEmit` -> `rtk pnpm lint` -> `rtk pnpm test`.
